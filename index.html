<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Monitor de Atención Pro - Alerta Integrada</title>
    <style>
        /* --- DISEÑO GENERAL --- */
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            text-align: center; 
            margin-top: 20px; 
            background-color: #f0f2f5; 
            color: #333;
        }

        /* Video espejado para mayor naturalidad */
        #video { 
            border: 4px solid #2c3e50; 
            width: 600px; 
            height: 450px; 
            border-radius: 12px; 
            transform: scaleX(-1); 
            background-color: #000;
        }

        /* Estilos de la barra de distracción */
        #contenedor-barra {
            width: 600px;
            height: 35px;
            background-color: #d1d1d1;
            margin: 20px auto;
            border-radius: 20px;
            overflow: hidden;
            border: 2px solid #bbb;
            position: relative;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        #barra {
            height: 100%;
            width: 0%;
            background-color: #2ecc71; /* Verde esmeralda */
            transition: width 0.4s ease-in-out, background-color 0.4s ease;
        }
        #texto-barra {
            position: absolute;
            width: 100%;
            text-align: center;
            line-height: 35px;
            font-weight: bold;
            color: #1a1a1a;
            top: 0;
            left: 0;
            text-shadow: 0 0 2px rgba(255,255,255,0.5);
        }

        /* --- ESTILOS DEL RECUADRO DE ALERTA (MODAL) --- */
        #capa-bloqueo {
            display: none; /* Oculto por defecto */
            position: fixed; 
            top: 0; left: 0; 
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85); /* Fondo muy oscuro */
            z-index: 9999; 
            justify-content: center; 
            align-items: center;
        }
        #cuadro-alerta {
            background: white; 
            padding: 40px; 
            border-radius: 20px;
            text-align: center; 
            border: 5px solid #d9534f;
            box-shadow: 0px 0px 30px rgba(217, 83, 79, 0.6);
            max-width: 450px;
        }
        #cuadro-alerta h2 { color: #d9534f; font-size: 32px; margin-bottom: 10px; }
        #cuadro-alerta p { font-size: 18px; margin-bottom: 25px; }
        #cuadro-alerta button {
            background: #2ecc71; 
            color: white; 
            border: none;
            padding: 12px 30px; 
            border-radius: 8px; 
            cursor: pointer; 
            font-size: 20px;
            font-weight: bold;
            transition: background 0.2s;
        }
        #cuadro-alerta button:hover { background: #27ae60; }

        #estado { font-size: 24px; font-weight: 600; margin-top: 10px; }
        .texto-alerta { color: #d9534f; }
    </style>
</head>
<body>

    <h1>Monitor de Atención Inteligente</h1>

    <div id="capa-bloqueo">
        <div id="cuadro-alerta">
            <h2>🚨 ¡DISTRACCIÓN!</h2>
            <p>Has superado el tiempo límite de distracción. Regresa tu atención a la pantalla para continuar.</p>
            <button onclick="cerrarAlerta()">ENTENDIDO / VOLVER</button>
        </div>
    </div>

    <video id="video" autoplay muted></video>

    <div id="contenedor-barra">
        <div id="barra"></div>
        <div id="texto-barra">Nivel de distracción: 0.0s / 5.0s</div>
    </div>

    <p id="estado">Iniciando sistema...</p>
    <canvas id="canvas" style="display:none;" width="640" height="480"></canvas>

    <script>
        // 1. CONFIGURACIÓN DE AZURE
        const AZURE_ENDPOINT = "https://face-mpv.cognitiveservices.azure.com";
        const SUBSCRIPTION_KEY = "AnTg6Uzlo1eHaQLad6r9S1j0K4woOaYoHDJUcnLEFngSYML35ptPJQQJ99CCAC8vTInXJ3w3AAAKACOGr4jH";

        // 2. AJUSTES DE PRECISIÓN (MENOS SENSIBLES)
        const UMBRAL_YAW = 35;         // Permite girar la cabeza 35° a los lados
        const UMBRAL_PITCH_DOWN = 45;  // Permite mirar el teclado (45° hacia abajo)
        const UMBRAL_PITCH_UP = 20;    // Permite mirar arriba 20°
        const UMBRAL_ALEJAMIENTO = 75; // Ancho de cara mínimo (si es menor, estás lejos)
        const FRECUENCIA_SCAN = 1000;  // Actualización cada 1 segundo

        // Elementos
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const estadoTexto = document.getElementById('estado');
        const barra = document.getElementById('barra');
        const textoBarra = document.getElementById('texto-barra');
        const capaBloqueo = document.getElementById('capa-bloqueo');
        const ctx = canvas.getContext('2d');

        // Variables de control
        let tiempoAnterior = Date.now();
        let nivelDistraccion = 0.0;
        const LIMITE_SEGUNDOS = 5.0;
        const TASA_RECUPERACION = 1.2; // Recupera la barra un poco más rápido de lo que sube
        let alertaActiva = false;      // Pausa el sistema si el modal está abierto

        // 3. ACCESO A CÁMARA
        navigator.mediaDevices.getUserMedia({ video: true })
            .then(stream => { 
                video.srcObject = stream; 
                estadoTexto.innerText = "Sistema Activo - Analizando...";
            })
            .catch(err => { 
                estadoTexto.innerText = "Error: No se detectó cámara."; 
            });

        // 4. FUNCIÓN PARA CERRAR EL RECUADRO
        function cerrarAlerta() {
            capaBloqueo.style.display = "none";
            nivelDistraccion = 0; // Reinicia la barra al cerrar
            alertaActiva = false;
            tiempoAnterior = Date.now(); // Reset de tiempo para evitar saltos bruscos
        }

        // 5. FUNCIÓN DE ANÁLISIS
        async function analizarFrame() {
            // Si el cuadro de alerta está visible, no procesamos nada
            if (alertaActiva) return;

            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            canvas.toBlob(async (blob) => {
                if (!blob) return;

                const url = `${AZURE_ENDPOINT}/face/v1.0/detect?returnFaceAttributes=headPose`;

                try {
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: {
                            'Ocp-Apim-Subscription-Key': SUBSCRIPTION_KEY,
                            'Content-Type': 'application/octet-stream'
                        },
                        body: blob
                    });

                    const faces = await response.json();
                    
                    // Cálculo de tiempo transcurrido
                    let tiempoActual = Date.now();
                    let deltaT = (tiempoActual - tiempoAnterior) / 1000;
                    tiempoAnterior = tiempoActual;
                    
                    let estaDistraido = false;

                    // Si no hay rostros, se considera distracción/abandono
                    if (!faces || faces.length === 0) {
                        estadoTexto.innerText = "Estado: Rostro no detectado";
                        estadoTexto.className = "texto-alerta";
                        estaDistraido = true;
                    } 
                    else {
                        const faceRect = faces[0].faceRectangle;
                        const headPose = faces[0].faceAttributes.headPose;
                        
                        // Lógica de validación
                        let muyLejos = faceRect.width < UMBRAL_ALEJAMIENTO;
                        let distraidoYaw = Math.abs(headPose.yaw) > UMBRAL_YAW;
                        let distraidoPitch = (headPose.pitch > UMBRAL_PITCH_DOWN) || (headPose.pitch < -UMBRAL_PITCH_UP);

                        if (muyLejos) {
                            estadoTexto.innerText = "Estado: Demasiado lejos";
                            estadoTexto.className = "texto-alerta";
                            estaDistraido = true;
                        } else if (distraidoYaw || distraidoPitch) {
                            estadoTexto.innerText = "Estado: Distraído";
                            estadoTexto.className = "texto-alerta";
                            estaDistraido = true;
                        } else {
                            estadoTexto.innerText = "Estado: Concentrado";
                            estadoTexto.className = "";
                            estaDistraido = false;
                        }
                    }

                    // 6. ACTUALIZAR ACUMULADOR
                    if (estaDistraido) {
                        nivelDistraccion += deltaT;
                    } else {
                        nivelDistraccion -= (deltaT * TASA_RECUPERACION);
                    }

                    // Limitar valores de la barra
                    nivelDistraccion = Math.max(0, Math.min(nivelDistraccion, LIMITE_SEGUNDOS));

                    // 7. ACTUALIZAR INTERFAZ
                    let porcentaje = (nivelDistraccion / LIMITE_SEGUNDOS) * 100;
                    barra.style.width = porcentaje + "%";
                    textoBarra.innerText = `Nivel de distracción: ${nivelDistraccion.toFixed(1)}s / ${LIMITE_SEGUNDOS}s`;

                    // Colores dinámicos
                    if (porcentaje < 40) barra.style.backgroundColor = "#2ecc71"; // Verde
                    else if (porcentaje < 80) barra.style.backgroundColor = "#f1c40f"; // Amarillo
                    else barra.style.backgroundColor = "#e74c3c"; // Rojo

                    // 8. DISPARAR RECUADRO DE ALERTA
                    if (nivelDistraccion >= LIMITE_SEGUNDOS) {
                        alertaActiva = true;
                        capaBloqueo.style.display = "flex"; // Muestra el modal centrado
                    }

                } catch (error) {
                    console.error("Error en API Azure:", error);
                }
            }, 'image/jpeg');
        }

        // Ejecutar bucle cada segundo
        setInterval(analizarFrame, FRECUENCIA_SCAN);
    </script>
</body>
</html>
