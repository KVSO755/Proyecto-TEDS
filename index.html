<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Monitor de Atencion Pro - Version Final</title>
    <style>
        /* --- 1. ESTILOS DE LA INTERFAZ BASE --- */
        body { 
            font-family: 'Segoe UI', sans-serif; 
            text-align: center; 
            margin-top: 20px; 
            background-color: #f0f2f5; 
        }

        #video { 
            border: 4px solid #2c3e50; 
            width: 600px; 
            height: 450px; 
            border-radius: 12px; 
            transform: scaleX(-1); 
            background-color: #000;
        }

        /* --- ESTILO PARA EL VIDEO DE LA DERECHA --- */
        #video-derecha {
            display: none; /* Oculto por defecto */
            position: fixed;
            top: 50%;
            right: 20px;
            transform: translateY(-50%);
            width: 300px; 
            border: 4px solid #d9534f; /* Borde rojo para que combine con la alerta */
            border-radius: 12px;
            background-color: #000;
            z-index: 10000; /* Por encima de la capa de bloqueo */
            box-shadow: 0px 0px 20px rgba(217, 83, 79, 0.8);
        }

        /* --- 2. ESTILOS DE LA BARRA DE PROGRESO --- */
        #contenedor-barra {
            width: 600px;
            height: 35px;
            background-color: #d1d1d1;
            margin: 20px auto;
            border-radius: 20px;
            overflow: hidden; 
            border: 2px solid #bbb;
            position: relative; 
        }

        #barra {
            height: 100%;
            width: 0%; 
            background-color: #2ecc71; 
            transition: width 0.4s ease, background-color 0.4s ease;
        }

        #texto-barra {
            position: absolute;
            width: 100%;
            text-align: center;
            line-height: 35px; 
            font-weight: bold;
            top: 0; left: 0;
            color: #333;
        }

        /* --- 3. ESTILOS DEL RECUADRO DE ALERTA (MODAL) --- */
        #capa-bloqueo {
            display: none; 
            position: fixed; 
            top: 0; left: 0; 
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85); 
            z-index: 9999; 
            justify-content: center; 
            align-items: center;
        }

        #cuadro-alerta {
            background: white; 
            padding: 40px; 
            border-radius: 20px;
            text-align: center; 
            border: 5px solid #d9534f;
            box-shadow: 0px 0px 30px rgba(217, 83, 79, 0.6);
            max-width: 450px;
        }°

        #cuadro-alerta h2 { color: #d9534f; margin: 0 0 10px 0; }

        #cuadro-alerta button {
            background: #2ecc71; 
            color: white; °°
            border: none;
            padding: 12px 30px; 
            border-radius: 8px; 
            cursor: pointer; 
            font-size: 18px;
            font-weight: bold;
        }

        #estado { font-size: 24px; font-weight: 600; margin-top: 10px; }
        .texto-alerta { color: #d9534f; }
    </style>
</head>
<body>

    <h1>Monitor de Atencion Inteligente</h1>

    <video id="video-derecha" loop controls>
        <source src="videoskeleto.mp4" type="video/mp4">
        Tu navegador no soporta el elemento de video.
    </video>

    <div id="capa-bloqueo">
        <div id="cuadro-alerta">
            <h2>🚨 ¡DISTRACCION!</h2>
            <p>Has superado el tiempo limite de distraccion. Regresa tu atencion a la pantalla.</p>
            <button onclick="cerrarAlerta()">ENTENDIDO / VOLVER</button>
        </div>
    </div>

    <video id="video" autoplay muted></video>

    <div id="contenedor-barra">
        <div id="barra"></div>
        <div id="texto-barra">Nivel de distraccion: 0.0s / 5.0s</div>
    </div>

    <p id="estado">Iniciando sistema...</p>

    <canvas id="canvas" style="display:none;" width="640" height="480"></canvas>

    <script>
        const AZURE_ENDPOINT = "https://face-mpv.cognitiveservices.azure.com";
        const SUBSCRIPTION_KEY = "AnTg6Uzlo1eHaQLad6r9S1j0K4woOaYoHDJUcnLEFngSYML35ptPJQQJ99CCAC8vTInXJ3w3AAAKACOGr4jH";

        const UMBRAL_YAW = 27;         
        const UMBRAL_PITCH_DOWN = 37;  
        const UMBRAL_PITCH_UP = 20;    
        const UMBRAL_ALEJAMIENTO = 75; 
        const FRECUENCIA_SCAN = 1500;  

        // Referencias a los elementos del HTML
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const estadoTexto = document.getElementById('estado');
        const barra = document.getElementById('barra');
        const textoBarra = document.getElementById('texto-barra');
        const capaBloqueo = document.getElementById('capa-bloqueo');
        const videoDerecha = document.getElementById('video-derecha'); // NUEVO
        const ctx = canvas.getContext('2d');

        // Variables de control de estado y tiempo
        let tiempoAnterior = Date.now();
        let nivelDistraccion = 0.0;
        const LIMITE_SEGUNDOS = 5.0;     
        const TASA_RECUPERACION = 1.2;   
        let alertaActiva = false;        

        // ==========================================
        // 3. INICIAR CÁMARA
        // ==========================================
        navigator.mediaDevices.getUserMedia({ video: true })
            .then(stream => { 
                video.srcObject = stream; 
                estadoTexto.innerText = "Sistema Activo - Escaneando cada segundo";
            })
            .catch(err => { 
                estadoTexto.innerText = "Error: No se encontro camara."; 
            });

        function cerrarAlerta() {
            capaBloqueo.style.display = "none"; 
            videoDerecha.style.display = "none"; // Oculta el video de la derecha
            videoDerecha.pause();                // Pausa el video
            nivelDistraccion = 0;              
            alertaActiva = false;              
            tiempoAnterior = Date.now();       
        }

        async function analizarFrame() {
            if (alertaActiva) return;

            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            // Convierte el dibujo en una imagen binaria (Blob)
            canvas.toBlob(async (blob) => {
                if (!blob) return;

                // Definimos la URL de Azure pidiendo los atributos de postura de cabeza y cuadro facial
                const url = `${AZURE_ENDPOINT}/face/v1.0/detect?returnFaceAttributes=headPose`;

                try {
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: {
                            'Ocp-Apim-Subscription-Key': SUBSCRIPTION_KEY,
                            'Content-Type': 'application/octet-stream'
                        },
                        body: blob
                    });

                    const faces = await response.json();
                    
                    let tiempoActual = Date.now();
                    let deltaT = (tiempoActual - tiempoAnterior) / 1000;
                    tiempoAnterior = tiempoActual;
                    
                    let estaDistraido = false;

                    if (!faces || faces.length === 0) {
                        estadoTexto.innerText = "Abandono la sesion";
                        estadoTexto.className = "texto-alerta";
                        estaDistraido = true;
                    } 
                    else {
                        const faceRect = faces[0].faceRectangle;
                        const headPose = faces[0].faceAttributes.headPose;
                        
                        // Validamos contra los umbrales de sensibilidad configurados
                        let muyLejos = faceRect.width < UMBRAL_ALEJAMIENTO;
                        let distraidoYaw = Math.abs(headPose.yaw) > UMBRAL_YAW;
                        let distraidoPitch = (headPose.pitch > UMBRAL_PITCH_DOWN) || (headPose.pitch < -UMBRAL_PITCH_UP);

                        if (muyLejos) {
                            estadoTexto.innerText = "Demasiado lejos";
                            estadoTexto.className = "texto-alerta";
                            estaDistraido = true;
                        } else if (distraidoYaw || distraidoPitch) {
                            estadoTexto.innerText = "Hubo Distraccion";
                            estadoTexto.className = "texto-alerta";
                            estaDistraido = true;
                        } else {
                            estadoTexto.innerText = "Enfocado";
                            estadoTexto.className = "";
                            estaDistraido = false;
                        }
                    }

                    // --- MANEJO DEL ACUMULADOR (LA BARRA) ---
                    if (estaDistraido) {
                        nivelDistraccion += deltaT; 
                    } else {
                        nivelDistraccion -= (deltaT * TASA_RECUPERACION); 
                    }

                    // Forzamos que el nivel no baje de 0 ni suba de 5
                    nivelDistraccion = Math.max(0, Math.min(nivelDistraccion, LIMITE_SEGUNDOS));

                    let porcentaje = (nivelDistraccion / LIMITE_SEGUNDOS) * 100;
                    barra.style.width = porcentaje + "%";
                    textoBarra.innerText = `Nivel de distraccion: ${nivelDistraccion.toFixed(1)}s / ${LIMITE_SEGUNDOS}s`;

                    if (porcentaje < 40) barra.style.backgroundColor = "#2ecc71"; 
                    else if (porcentaje < 80) barra.style.backgroundColor = "#f1c40f"; 
                    else barra.style.backgroundColor = "#e74c3c"; 

                    if (nivelDistraccion >= LIMITE_SEGUNDOS) {
                        alertaActiva = true;
                        capaBloqueo.style.display = "flex"; 
                        
                        // Mostrar y reproducir el video de la derecha
                        videoDerecha.style.display = "block";
                        videoDerecha.currentTime = 0;
                        videoDerecha.play().catch(e => console.log("Bloqueado por el navegador", e));
                    }

                } catch (error) {
                    console.error("Error al conectar con Azure:", error);
                }
            }, 'image/jpeg');
        }

        setInterval(analizarFrame, FRECUENCIA_SCAN);
    </script>
</body>
</html>
